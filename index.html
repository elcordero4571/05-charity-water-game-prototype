<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Escape Gameplay Prototype</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 15px 0 5px;
    }

    p {
      margin: 5px 0 15px;
    }

    canvas {
      background: #31c7df;
      border: 4px solid white;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <h1>Water Escape Prototype</h1>
  <p>Move: A/D or Arrow Keys | Jump: W/Space/Up | Break: E or F | Restart: R</p>

  <canvas id="gameCanvas" width="960" height="540"></canvas>

  <script>
    // ==================================================
    // 1. CANVAS SETUP
    // ==================================================

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    // ==================================================
    // 2. GAME SETTINGS
    // ==================================================

    const gravity = 0.7;
    const moveSpeed = 5;
    const jumpPower = -14;

    let keys = {};
    let score = 0;
    let lives = 3;
    let gameWon = false;
    let gameOver = false;
    let attackCooldown = 0;
    let invincibleTimer = 0;
    let startTime = Date.now();

    // ==================================================
    // 3. PLAYER
    // ==================================================

    const player = {
      x: 60,
      y: 420,
      w: 40,
      h: 55,
      vx: 0,
      vy: 0,
      onGround: false,
      facing: 1
    };

    // ==================================================
    // 4. LEVEL OBJECTS
    // ==================================================

    let platforms;
    let obstacles;
    let germs;
    let pipe;

    function loadLevel() {
      player.x = 60;
      player.y = 420;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.facing = 1;

      score = 0;
      lives = 3;
      gameWon = false;
      gameOver = false;
      attackCooldown = 0;
      invincibleTimer = 0;
      startTime = Date.now();

      platforms = [
        { x: 0, y: 500, w: 960, h: 40 },
        { x: 220, y: 420, w: 140, h: 25 },
        { x: 450, y: 350, w: 140, h: 25 },
        { x: 690, y: 280, w: 150, h: 25 }
      ];

      obstacles = [
        { x: 300, y: 360, w: 60, h: 60, hp: 2 },
        { x: 520, y: 290, w: 60, h: 60, hp: 3 },
        { x: 760, y: 220, w: 60, h: 60, hp: 3 }
      ];

      germs = [
        { x: 150, y: 460, w: 40, h: 40, vx: 2, minX: 90, maxX: 250 },
        { x: 450, y: 310, w: 40, h: 40, vx: 1.7, minX: 450, maxX: 560 },
        { x: 700, y: 240, w: 40, h: 40, vx: 1.5, minX: 690, maxX: 820 }
      ];

      pipe = {
        x: 880,
        y: 200,
        w: 55,
        h: 80
      };
    }

    loadLevel();

    // ==================================================
    // 5. KEYBOARD CONTROLS
    // ==================================================

    document.addEventListener("keydown", function(event) {
      const key = event.key.toLowerCase();
      keys[key] = true;

      if (key === " " || key === "arrowup") {
        event.preventDefault();
      }

      if ((key === "e" || key === "f") && !gameWon && !gameOver) {
        attackObstacle();
      }

      if (key === "r") {
        loadLevel();
      }
    });

    document.addEventListener("keyup", function(event) {
      keys[event.key.toLowerCase()] = false;
    });

    // ==================================================
    // 6. GAME LOOP
    // ==================================================

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();

    // ==================================================
    // 7. UPDATE GAME LOGIC
    // ==================================================

    function update() {
      if (gameWon || gameOver) {
        return;
      }

      if (attackCooldown > 0) {
        attackCooldown--;
      }

      if (invincibleTimer > 0) {
        invincibleTimer--;
      }

      movePlayer();
      moveGerms();
      checkGermDamage();
      checkPipeGoal();
    }

    // ==================================================
    // 8. PLAYER MOVEMENT
    // ==================================================

    function movePlayer() {
      player.vx = 0;

      if (keys["a"] || keys["arrowleft"]) {
        player.vx = -moveSpeed;
        player.facing = -1;
      }

      if (keys["d"] || keys["arrowright"]) {
        player.vx = moveSpeed;
        player.facing = 1;
      }

      if ((keys["w"] || keys[" "] || keys["arrowup"]) && player.onGround) {
        player.vy = jumpPower;
        player.onGround = false;
      }

      player.vy += gravity;

      moveWithCollision("x");
      moveWithCollision("y");

      if (player.x < 0) {
        player.x = 0;
      }

      if (player.x + player.w > WIDTH) {
        player.x = WIDTH - player.w;
      }

      if (player.y > HEIGHT) {
        damagePlayer();
      }
    }

    // ==================================================
    // 9. COLLISION
    // ==================================================

    function getSolidObjects() {
      return platforms.concat(obstacles);
    }

    function moveWithCollision(axis) {
      const solids = getSolidObjects();

      if (axis === "x") {
        player.x += player.vx;

        solids.forEach(function(solid) {
          if (isColliding(player, solid)) {
            if (player.vx > 0) {
              player.x = solid.x - player.w;
            } else if (player.vx < 0) {
              player.x = solid.x + solid.w;
            }

            player.vx = 0;
          }
        });
      }

      if (axis === "y") {
        player.y += player.vy;
        player.onGround = false;

        solids.forEach(function(solid) {
          if (isColliding(player, solid)) {
            if (player.vy > 0) {
              player.y = solid.y - player.h;
              player.onGround = true;
            } else if (player.vy < 0) {
              player.y = solid.y + solid.h;
            }

            player.vy = 0;
          }
        });
      }
    }

    function isColliding(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    // ==================================================
    // 10. BREAKABLE OBSTACLES
    // ==================================================

    function attackObstacle() {
      if (attackCooldown > 0) {
        return;
      }

      attackCooldown = 20;

      const attackBox = {
        x: player.facing === 1 ? player.x + player.w : player.x - 40,
        y: player.y + 10,
        w: 40,
        h: 35
      };

      obstacles.forEach(function(obstacle) {
        if (isColliding(attackBox, obstacle)) {
          obstacle.hp--;

          if (obstacle.hp <= 0) {
            obstacle.broken = true;
            score += 50;
          }
        }
      });

      obstacles = obstacles.filter(function(obstacle) {
        return !obstacle.broken;
      });
    }

    // ==================================================
    // 11. GERM / BACTERIA ENEMIES
    // ==================================================

    function moveGerms() {
      germs.forEach(function(germ) {
        germ.x += germ.vx;

        if (germ.x < germ.minX || germ.x > germ.maxX) {
          germ.vx *= -1;
        }
      });
    }

    function checkGermDamage() {
      germs.forEach(function(germ) {
        if (isColliding(player, germ) && invincibleTimer <= 0) {
          damagePlayer();
        }
      });
    }

    function damagePlayer() {
      lives--;
      invincibleTimer = 90;

      player.x = 60;
      player.y = 420;
      player.vx = 0;
      player.vy = 0;

      if (lives <= 0) {
        gameOver = true;
      }
    }

    // ==================================================
    // 12. PIPE GOAL
    // ==================================================

    function checkPipeGoal() {
      if (isColliding(player, pipe)) {
        score += 200;
        gameWon = true;
      }
    }

    // ==================================================
    // 13. DRAWING
    // ==================================================

    function draw() {
      drawBackground();
      drawPlatforms();
      drawObstacles();
      drawPipe();
      drawGerms();
      drawPlayer();
      drawUI();

      if (gameWon) {
        drawCenterMessage("Clean Water Restored!", "Press R to restart");
      }

      if (gameOver) {
        drawCenterMessage("Game Over", "Press R to try again");
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#31c7df";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "#24b51f";
      ctx.fillRect(0, 360, WIDTH, 180);

      ctx.fillStyle = "#1799ad";
      ctx.fillRect(0, 500, WIDTH, 40);

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(100, 90, 30, 0, Math.PI * 2);
      ctx.arc(140, 75, 40, 0, Math.PI * 2);
      ctx.arc(185, 90, 30, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(700, 80, 30, 0, Math.PI * 2);
      ctx.arc(740, 65, 40, 0, Math.PI * 2);
      ctx.arc(785, 80, 30, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlatforms() {
      ctx.fillStyle = "#0f7f25";

      platforms.forEach(function(platform) {
        ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
      });
    }

    function drawObstacles() {
      obstacles.forEach(function(obstacle) {
        ctx.fillStyle = "#8a5a2b";
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.fillText("HP " + obstacle.hp, obstacle.x + 10, obstacle.y + 35);
      });
    }

    function drawPipe() {
      ctx.fillStyle = "#d9d9d9";
      ctx.fillRect(pipe.x, pipe.y, pipe.w, pipe.h);

      ctx.fillStyle = "#167f91";
      ctx.fillRect(pipe.x + 10, pipe.y + 10, pipe.w - 20, pipe.h - 20);

      ctx.fillStyle = "white";
      ctx.font = "15px Arial";
      ctx.fillText("PIPE", pipe.x + 8, pipe.y - 10);
    }

    function drawGerms() {
      germs.forEach(function(germ) {
        ctx.fillStyle = "#0b5c2c";
        ctx.beginPath();
        ctx.arc(germ.x + germ.w / 2, germ.y + germ.h / 2, germ.w / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "11px Arial";
        ctx.fillText("GERM", germ.x + 3, germ.y + 24);
      });
    }

    function drawPlayer() {
      if (invincibleTimer > 0 && Math.floor(invincibleTimer / 8) % 2 === 0) {
        return;
      }

      ctx.fillStyle = "white";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      ctx.fillStyle = "#ffd23f";

      if (player.facing === 1) {
        ctx.fillRect(player.x + player.w - 8, player.y + 15, 8, 8);
      } else {
        ctx.fillRect(player.x, player.y + 15, 8, 8);
      }
    }

    function drawUI() {
      const time = Math.floor((Date.now() - startTime) / 1000);

      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 35);
      ctx.fillText("Lives: " + lives, 160, 35);
      ctx.fillText("Time: " + time, 270, 35);

      ctx.font = "16px Arial";
      ctx.fillText("Break obstacles, avoid germs, and reach the clean water pipe.", 500, 35);
    }

    function drawCenterMessage(title, subtitle) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "white";
      ctx.font = "48px Arial";
      ctx.textAlign = "center";
      ctx.fillText(title, WIDTH / 2, HEIGHT / 2 - 20);

      ctx.font = "24px Arial";
      ctx.fillText(subtitle, WIDTH / 2, HEIGHT / 2 + 30);

      ctx.textAlign = "left";
    }
  </script>
</body>
</html>
